name: Publier la présentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Installer R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Installer les packages R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::tidyr
            any::plotly
            any::reticulate

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pandas
        run: pip install pandas

      - name: Indiquer Python à reticulate
        run: echo "RETICULATE_PYTHON=$(which python)" >> "$GITHUB_ENV"

      - name: Rendre et publier sur gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
