name: Publier la présentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Rendre la présentation
        uses: quarto-dev/quarto-actions/render@v2

      - name: Désactiver Jekyll sur le site (.nojekyll)
        run: touch _site/.nojekyll

      - name: Publier sur la branche gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
