name: Publier la présentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Installer R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Installer les packages R (mis en cache automatiquement)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::dplyr
            any::tidyr
            any::plotly
            any::reticulate

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pandas
        run: pip install pandas

      - name: Indiquer Python à reticulate
        run: echo "RETICULATE_PYTHON=$(which python)" >> "$GITHUB_ENV"

      - name: Rendre la présentation (exécute R + Python)
        uses: quarto-dev/quarto-actions/render@v2

      - name: Publier sur la branche gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
